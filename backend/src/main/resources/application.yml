spring:
  application:
    name: tickets
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/tickets}
    username: ${DB_USER:tickets}
    password: ${DB_PASSWORD:tickets}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}
